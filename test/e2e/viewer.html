<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task Run Viewer</title>
<style>
  /* ── Theme ─────────────────────────────────────────────────────────────── */
  :root {
    --bg:#0d1117; --bg2:#161b22; --bg3:#1c2230; --line:#283041;
    --fg:#e6edf3; --dim:#8b949e; --faint:#6e7681;
    --accent:#58a6ff; --ok:#3fb950; --err:#f85149; --warn:#d29922;
    --radius:10px; --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--fg); font-family:var(--sans);
    font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;
  }

  /* ── Top bar ───────────────────────────────────────────────────────────── */
  header {
    position:sticky; top:0; z-index:10; background:rgba(13,17,23,.92);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
    padding:10px 18px; display:flex; gap:14px; align-items:center; flex-wrap:wrap;
  }
  header h1 { font-size:14px; margin:0; font-weight:600; letter-spacing:.2px; }
  header h1 .dot { color:var(--accent); }
  .spacer { flex:1; }
  .btn {
    background:var(--bg3); color:var(--fg); border:1px solid var(--line);
    border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; font-family:var(--sans);
  }
  .btn:hover { border-color:var(--accent); }
  label.toggle { display:inline-flex; gap:6px; align-items:center; color:var(--dim); font-size:13px; cursor:pointer; user-select:none; }
  #filter {
    background:var(--bg); color:var(--fg); border:1px solid var(--line);
    border-radius:8px; padding:6px 10px; font-size:13px; width:200px; font-family:var(--sans);
  }
  #filter:focus { outline:none; border-color:var(--accent); }

  /* ── Layout ────────────────────────────────────────────────────────────── */
  main { max-width:960px; margin:0 auto; padding:22px 18px 120px; }

  /* Empty state */
  .empty {
    margin-top:12vh; text-align:center; color:var(--dim);
    border:1.5px dashed var(--line); border-radius:16px; padding:54px 24px;
  }
  .empty h2 { color:var(--fg); font-weight:600; margin:0 0 8px; }
  .empty code { background:var(--bg3); padding:2px 6px; border-radius:5px; font-family:var(--mono); color:var(--accent); }
  .empty .legend { margin-top:26px; display:flex; gap:8px 16px; justify-content:center; flex-wrap:wrap; }

  /* ── Cards (init / result) ─────────────────────────────────────────────── */
  .card { background:var(--bg2); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin-bottom:18px; }
  .card.result { border-left:3px solid var(--ok); }
  .card.result.error { border-left-color:var(--err); }
  .card .ctitle { font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:var(--dim); margin-bottom:10px; }
  .stats { display:flex; flex-wrap:wrap; gap:8px 10px; }
  .stat { background:var(--bg3); border:1px solid var(--line); border-radius:8px; padding:6px 10px; min-width:78px; }
  .stat .k { font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--faint); }
  .stat .v { font-size:15px; font-weight:600; font-variant-numeric:tabular-nums; }
  .stat .v.ok { color:var(--ok); } .stat .v.err { color:var(--err); }

  /* ── Events ────────────────────────────────────────────────────────────── */
  .event { margin:8px 0; display:flex; gap:10px; align-items:flex-start; }
  .gutter { flex:0 0 88px; text-align:right; padding-top:2px; }
  .role { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--faint); font-weight:600; }
  .body { flex:1; min-width:0; }

  /* prose: rendered markdown for assistant text + final result */
  .prose { background:var(--bg2); border:1px solid var(--line); border-radius:var(--radius); padding:2px 16px; overflow-wrap:anywhere; }
  .prose.user { background:#13233b; border-color:#1f3a5f; }
  .prose h1,.prose h2,.prose h3,.prose h4 { line-height:1.3; margin:.9em 0 .4em; }
  .prose h1 { font-size:1.45em; } .prose h2 { font-size:1.25em; } .prose h3 { font-size:1.1em; }
  .prose p { margin:.55em 0; }
  .prose ul,.prose ol { margin:.5em 0; padding-left:1.4em; }
  .prose li { margin:.2em 0; }
  .prose a { color:var(--accent); }
  .prose code { background:var(--bg3); padding:1.5px 5px; border-radius:5px; font-family:var(--mono); font-size:.88em; }
  .prose pre.code { background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:11px 13px; overflow:auto; }
  .prose pre.code code { background:none; padding:0; font-size:.85em; line-height:1.5; }
  .prose blockquote { border-left:3px solid var(--line); margin:.6em 0; padding:.1em 0 .1em 12px; color:var(--dim); }
  .prose hr { border:none; border-top:1px solid var(--line); margin:1em 0; }
  .prose table { border-collapse:collapse; margin:.6em 0; font-size:.92em; display:block; overflow:auto; }
  .prose th,.prose td { border:1px solid var(--line); padding:5px 10px; text-align:left; }
  .prose th { background:var(--bg3); }

  /* tool call block — coloured by family via --c */
  .tool { border:1px solid var(--line); border-left:3px solid var(--c,#94a3b8); border-radius:var(--radius); background:var(--bg2); overflow:hidden; }
  .tool > summary { list-style:none; cursor:pointer; padding:9px 13px; display:flex; gap:9px; align-items:center; }
  .tool > summary::-webkit-details-marker { display:none; }
  .tool .badge {
    flex:0 0 auto; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.3px;
    color:var(--c,#94a3b8); border:1px solid var(--c,#94a3b8); border-radius:6px;
    padding:2px 7px; background:color-mix(in srgb, var(--c) 12%, transparent);
  }
  .tool .name { font-weight:600; }
  .tool .sum { color:var(--dim); font-family:var(--mono); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .tool .chev { color:var(--faint); transition:transform .12s; }
  .tool[open] .chev { transform:rotate(90deg); }
  .tool.skill { border-left-width:4px; background:color-mix(in srgb, var(--c) 7%, var(--bg2)); }
  .tool.skill .name { color:var(--c); }
  .tool .detail { padding:0 13px 12px; }
  .tool .lbl { font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--faint); margin:10px 0 4px; }
  pre.raw { background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin:0; overflow:auto; max-height:340px; font-family:var(--mono); font-size:12px; line-height:1.5; white-space:pre-wrap; overflow-wrap:anywhere; color:#cdd9e5; }
  pre.raw.result { border-color:#244; }
  .result-err pre.raw { border-color:var(--err); }
  .pill { font-size:10.5px; padding:1px 7px; border-radius:20px; border:1px solid var(--line); color:var(--dim); }
  .pill.err { color:var(--err); border-color:var(--err); }
  .pill.ok { color:var(--ok); border-color:var(--ok); }

  /* thinking — minimised by default */
  details.think { border:1px dashed var(--line); border-radius:var(--radius); background:transparent; }
  details.think > summary { list-style:none; cursor:pointer; padding:7px 13px; color:var(--faint); font-size:12.5px; font-style:italic; display:flex; gap:8px; align-items:center; }
  details.think > summary::-webkit-details-marker { display:none; }
  details.think .think-body { padding:2px 15px 12px; color:var(--dim); font-size:13px; white-space:pre-wrap; overflow-wrap:anywhere; font-style:italic; }
  body.hide-thinking details.think { display:none; }

  .hidden { display:none !important; }
  .drop-hint { position:fixed; inset:0; background:rgba(13,17,23,.85); display:none; align-items:center; justify-content:center; z-index:50; font-size:20px; color:var(--accent); border:3px dashed var(--accent); }
  body.dragging .drop-hint { display:flex; }
</style>
</head>
<body class="hide-thinking">
  <header>
    <h1><span class="dot">●</span> Task Run Viewer</h1>
    <button class="btn" id="open">Open .jsonl…</button>
    <span id="fname" class="role"></span>
    <span class="spacer"></span>
    <input id="filter" type="search" placeholder="Filter events…" disabled>
    <label class="toggle"><input type="checkbox" id="thinking"> Thinking</label>
    <label class="toggle"><input type="checkbox" id="expand"> Expand all</label>
    <input id="file" type="file" accept=".jsonl,.json,application/json" class="hidden">
  </header>

  <main id="main">
    <div class="empty" id="empty">
      <h2>Drop a task-run log here</h2>
      <p>Open any <code>*.stream.jsonl</code> from <code>test/e2e/logs/&lt;run&gt;/</code> —
         or pass <code>?file=logs/latest/01-booking.stream.jsonl</code> when serving over HTTP.</p>
      <div class="legend" id="legend"></div>
    </div>
  </main>

  <div class="drop-hint">Drop the .jsonl to view it</div>

<script>
/* ════════════════════════════════════════════════════════════════════════════
   Task Run Viewer — a dependency-free renderer for Claude Code stream-json logs.

   A run is a sequence of newline-delimited JSON records:
     system/init           one header with model, cwd, available tools & skills
     assistant             content blocks: thinking | text | tool_use
     user                  content blocks: tool_result (keyed by tool_use_id) | text
     system/thinking_tokens noise — counted, not shown
     result                final summary: success/error, duration, cost, usage

   Tool calls (assistant.tool_use) and their outputs (user.tool_result) live in
   separate records; we index results by id and stitch them under the call.
   ════════════════════════════════════════════════════════════════════════════ */

/* ── Tool colour families ─ Skill is the deliberate standout (violet). ─────── */
const TOOL_THEME = {
  Skill:     { c:'#c084fc', icon:'✦', skill:true },
  Bash:      { c:'#3fb950', icon:'❯' },
  Read:      { c:'#58a6ff', icon:'▤' },
  Write:     { c:'#d29922', icon:'✎' },
  Edit:      { c:'#e3873c', icon:'✎' },
  NotebookEdit:{ c:'#e3873c', icon:'✎' },
  WebFetch:  { c:'#2dd4bf', icon:'⤓' },
  WebSearch: { c:'#2dd4bf', icon:'⌕' },
  Grep:      { c:'#818cf8', icon:'⌕' },
  Glob:      { c:'#818cf8', icon:'⁂' },
  Task:      { c:'#f472b6', icon:'⛓' },
  Agent:     { c:'#f472b6', icon:'⛓' },
  Workflow:  { c:'#f472b6', icon:'❖' },
  ToolSearch:{ c:'#94a3b8', icon:'⚒' },
  AskUserQuestion:{ c:'#facc15', icon:'?' },
};
const FALLBACK = { c:'#94a3b8', icon:'⚒' };
const theme = name => TOOL_THEME[name] || FALLBACK;

/* ── Minimal markdown → HTML (escaped first, so it is XSS-safe). ───────────── */
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function inlineMd(t){
  t = escapeHtml(t);
  const codes = [];
  t = t.replace(/`([^`]+)`/g, (_,c) => { codes.push(c); return ''+(codes.length-1)+''; });
  t = t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
       .replace(/\b__([^_]+)__\b/g,'<strong>$1</strong>')
       .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
       .replace(/~~([^~]+)~~/g,'<del>$1</del>')
       .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t.replace(/(\d+)/g, (_,i) => '<code>'+codes[+i]+'</code>');
}

function renderMarkdown(src){
  if (src == null) return '';
  src = String(src).replace(/\r\n/g,'\n');
  // Protect fenced code blocks before any line parsing.
  const fences = [];
  src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) => {
    fences.push('<pre class="code"><code>'+escapeHtml(code.replace(/\n$/,''))+'</code></pre>');
    return '␀F'+(fences.length-1)+'␀';
  });

  const lines = src.split('\n');
  const out = [];
  let para = [];
  const flush = () => { if (para.length){ out.push('<p>'+para.map(inlineMd).join('<br>')+'</p>'); para = []; } };
  const isSep = s => /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(s) && s.includes('-');

  for (let i = 0; i < lines.length; i++) {
    const ln = lines[i], t = ln.trim();
    let m;
    if ((m = /^␀F(\d+)␀$/.exec(t)))      { flush(); out.push(fences[+m[1]]); continue; }
    if (!t)                                         { flush(); continue; }
    if ((m = /^(#{1,6})\s+(.*)$/.exec(t)))          { flush(); const h=m[1].length; out.push('<h'+h+'>'+inlineMd(m[2])+'</h'+h+'>'); continue; }
    if (/^(\*\*\*|---|___)\s*$/.test(t))            { flush(); out.push('<hr>'); continue; }
    if (t[0] === '>')                               { flush(); const q=[]; while(i<lines.length && lines[i].trim()[0]==='>'){ q.push(lines[i].trim().replace(/^>\s?/,'')); i++; } i--; out.push('<blockquote>'+inlineMd(q.join('\n')).replace(/\n/g,'<br>')+'</blockquote>'); continue; }
    // Table: header row followed by a separator row.
    if (t.includes('|') && i+1 < lines.length && isSep(lines[i+1])) {
      flush();
      const cells = r => r.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      let tbl = '<table><thead><tr>'+cells(t).map(c=>'<th>'+inlineMd(c)+'</th>').join('')+'</tr></thead><tbody>';
      i += 2;
      while (i < lines.length && lines[i].includes('|')) { tbl += '<tr>'+cells(lines[i]).map(c=>'<td>'+inlineMd(c)+'</td>').join('')+'</tr>'; i++; }
      i--; out.push(tbl+'</tbody></table>'); continue;
    }
    if (/^[-*+]\s+/.test(t) || /^\d+[.)]\s+/.test(t)) {
      flush();
      const ordered = /^\d+[.)]\s+/.test(t); const items = [];
      while (i < lines.length) {
        const s = lines[i].trim();
        if (/^[-*+]\s+/.test(s))        items.push(s.replace(/^[-*+]\s+/,''));
        else if (/^\d+[.)]\s+/.test(s)) items.push(s.replace(/^\d+[.)]\s+/,''));
        else break;
        i++;
      }
      i--;
      const tag = ordered ? 'ol' : 'ul';
      out.push('<'+tag+'>'+items.map(x=>'<li>'+inlineMd(x)+'</li>').join('')+'</'+tag+'>');
      continue;
    }
    para.push(ln);
  }
  flush();
  return out.join('\n');
}

/* ── Helpers ───────────────────────────────────────────────────────────────── */
const $ = (s,r=document) => r.querySelector(s);
function el(tag, cls, html){ const n=document.createElement(tag); if(cls)n.className=cls; if(html!=null)n.innerHTML=html; return n; }
function fmtDur(ms){ if(ms==null)return'—'; if(ms<1000)return ms+'ms'; const s=ms/1000; if(s<60)return s.toFixed(1)+'s'; const m=Math.floor(s/60); return m+'m '+Math.round(s%60)+'s'; }
function fmtNum(n){ return n==null?'—':n.toLocaleString('en-US'); }
function clip(s,n){ s=String(s).replace(/\s+/g,' ').trim(); return s.length>n? s.slice(0,n-1)+'…' : s; }

/* One-line summary of a tool's input, for the collapsed call header. */
function toolSummary(name, inp){
  if (!inp || typeof inp !== 'object') return '';
  const f = k => inp[k];
  switch (name) {
    case 'Bash':       return f('command') || '';
    case 'Read': case 'Write': case 'Edit': case 'NotebookEdit': return f('file_path') || '';
    case 'Skill':      return [f('skill'), f('args')].filter(Boolean).join(' — ');
    case 'WebFetch':   return f('url') || '';
    case 'WebSearch': case 'ToolSearch': case 'Grep': case 'Glob': return f('query') || f('pattern') || '';
    case 'Task': case 'Agent': return f('description') || f('subagent_type') || '';
    default: { const v = Object.values(inp).find(x => typeof x === 'string'); return v || JSON.stringify(inp); }
  }
}

/* tool_result content may be a string or an array of blocks. Normalise to text. */
function resultText(content){
  if (content == null) return '';
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) return content.map(b => {
    if (b.type === 'text') return b.text;
    if (b.type === 'tool_reference') return '→ '+(b.name || 'tool');
    if (b.type === 'image') return '[image]';
    return JSON.stringify(b);
  }).join('\n');
  return JSON.stringify(content, null, 2);
}

/* ── Parse + analyse a run ───────────────────────────────────────────────────── */
function parse(text){
  const records = [];
  for (const line of text.split('\n')) {
    const s = line.trim(); if (!s) continue;
    try { records.push(JSON.parse(s)); } catch { /* skip malformed line */ }
  }
  // Index tool_result blocks by the tool_use_id they answer.
  const results = {};
  for (const r of records) {
    if (r.type !== 'user') continue;
    const c = r.message?.content;
    if (Array.isArray(c)) for (const b of c) if (b.type === 'tool_result') results[b.tool_use_id] = b;
  }
  return { records, results };
}

/* ── Render ────────────────────────────────────────────────────────────────── */
function render(text, filename){
  const main = $('#main'); main.innerHTML = '';
  const { records, results } = parse(text);
  const init   = records.find(r => r.type === 'system' && r.subtype === 'init');
  const result = records.find(r => r.type === 'result');

  let thinkBlocks = 0, toolCalls = 0, skillCalls = 0;
  const consumed = new Set();   // tool_use_ids already shown under their call

  if (init) main.appendChild(initCard(init));

  records.forEach(r => {
    if (r.type === 'assistant') {
      const blocks = r.message?.content || [];
      for (const b of blocks) {
        if (b.type === 'thinking')      { thinkBlocks++; main.appendChild(thinkingEvent(b)); }
        else if (b.type === 'text' && b.text?.trim()) main.appendChild(proseEvent('assistant', b.text));
        else if (b.type === 'tool_use') {
          toolCalls++; if (b.name === 'Skill') skillCalls++;
          consumed.add(b.id);
          main.appendChild(toolEvent(b, results[b.id]));
        }
      }
    } else if (r.type === 'user') {
      const c = r.message?.content;
      if (typeof c === 'string' && c.trim())        main.appendChild(proseEvent('user', c));
      else if (Array.isArray(c)) for (const b of c) {
        if (b.type === 'text' && b.text?.trim())    main.appendChild(proseEvent('user', b.text));
        // tool_result blocks are rendered under their call; orphans (no matching
        // call in this file) are shown standalone so nothing is silently dropped.
        else if (b.type === 'tool_result' && !consumed.has(b.tool_use_id))
          main.appendChild(toolEvent({ name:'(result)', id:b.tool_use_id, input:null }, b));
      }
    }
  });

  if (result) main.appendChild(resultCard(result, { thinkBlocks, toolCalls, skillCalls, init }));

  $('#fname').textContent = filename || '';
  $('#filter').disabled = false;
  applyFilter();
}

function initCard(init){
  const c = el('div','card');
  c.appendChild(el('div','ctitle','Run'));
  const stats = el('div','stats');
  const add = (k,v) => { const s=el('div','stat'); s.append(el('div','k',k), el('div','v',escapeHtml(String(v)))); stats.appendChild(s); };
  if (init.model) add('Model', init.model);
  if (init.permissionMode) add('Permission', init.permissionMode);
  if (init.tools)  add('Tools', init.tools.length);
  if (init.skills) add('Skills', init.skills.length);
  if (init.claude_code_version) add('Version', init.claude_code_version);
  if (init.cwd)    add('CWD', init.cwd.replace(/^.*\//,'…/'));
  c.appendChild(stats);
  return c;
}

function rowWrap(role, node){
  const ev = el('div','event');
  const g = el('div','gutter'); g.appendChild(el('div','role', role));
  ev.append(g, (() => { const b=el('div','body'); b.appendChild(node); return b; })());
  ev._text = (node.textContent || '').toLowerCase();
  return ev;
}

function proseEvent(role, md){
  const p = el('div', 'prose'+(role==='user'?' user':''), renderMarkdown(md));
  return rowWrap(role==='user'?'user':'assistant', p);
}

function thinkingEvent(b){
  const d = el('details','think');
  const sum = el('summary'); sum.innerHTML = '💭 thinking <span class="role" style="margin-left:auto">'+clip(b.thinking,60)+'</span>';
  d.appendChild(sum);
  d.appendChild(el('div','think-body', escapeHtml(b.thinking || '')));
  const ev = rowWrap('', d); ev.classList.add('think-row'); return ev;
}

function toolEvent(b, res){
  const isResultOnly = b.name === '(result)';
  const th = isResultOnly ? FALLBACK : theme(b.name);
  const d = el('details', 'tool' + (th.skill ? ' skill' : ''));
  d.style.setProperty('--c', th.c);

  const sum = el('summary');
  const badge = el('span','badge', th.icon + (th.skill ? ' SKILL' : ''));
  const name  = el('span','name', escapeHtml(isResultOnly ? 'tool result' : b.name));
  const oneLine = isResultOnly ? clip(resultText(res?.content), 120) : clip(toolSummary(b.name, b.input), 120);
  const summ  = el('span','sum', escapeHtml(oneLine));
  sum.append(badge, name, summ, el('span','chev','›'));
  if (res?.is_error) sum.appendChild(el('span','pill err','error'));
  d.appendChild(sum);

  const detail = el('div','detail');
  if (!isResultOnly && b.input != null) {
    detail.appendChild(el('div','lbl','input'));
    detail.appendChild(el('pre','raw', escapeHtml(typeof b.input==='string'?b.input:JSON.stringify(b.input,null,2))));
  }
  if (res) {
    detail.appendChild(el('div','lbl', res.is_error ? 'result · error' : 'result'));
    const pre = el('pre','raw result', escapeHtml(resultText(res.content)));
    if (res.is_error) { d.classList.add('result-err'); }
    detail.appendChild(pre);
  } else if (!isResultOnly) {
    detail.appendChild(el('div','lbl','result'));
    detail.appendChild(el('div','role','(no result captured in this file)'));
  }
  d.appendChild(detail);
  return rowWrap('', d);
}

function resultCard(r, counts){
  const c = el('div','card result' + (r.is_error ? ' error' : ''));
  c.appendChild(el('div','ctitle', r.is_error ? 'Result · error' : 'Result'));
  const stats = el('div','stats');
  const add = (k,v,cls) => { const s=el('div','stat'); const vv=el('div','v'+(cls?' '+cls:'')); vv.textContent=v; s.append(el('div','k',k), vv); stats.appendChild(s); };
  add('Status', r.is_error ? 'error' : (r.subtype||'ok'), r.is_error?'err':'ok');
  if (r.num_turns!=null)  add('Turns', r.num_turns);
  add('Tools', counts.toolCalls);
  add('Skills', counts.skillCalls);
  if (r.duration_ms!=null) add('Duration', fmtDur(r.duration_ms));
  if (r.ttft_ms!=null)     add('TTFT', fmtDur(r.ttft_ms));
  const u = r.usage || {};
  if (u.input_tokens!=null)  add('In tok', fmtNum(u.input_tokens));
  if (u.output_tokens!=null) add('Out tok', fmtNum(u.output_tokens));
  const cache = (u.cache_read_input_tokens||0);
  if (cache) add('Cache rd', fmtNum(cache));
  add('Thinking', counts.thinkBlocks + ' blk');
  if (r.total_cost_usd!=null) add('Cost', '$'+r.total_cost_usd.toFixed(4));
  c.appendChild(stats);

  if (r.result) {
    const p = el('div','prose', renderMarkdown(r.result)); p.style.marginTop='14px';
    c.appendChild(p);
  }
  return c;
}

/* ── Controls ─────────────────────────────────────────────────────────────── */
function applyFilter(){
  const q = $('#filter').value.trim().toLowerCase();
  document.querySelectorAll('.event').forEach(ev => {
    if (!q) { ev.classList.remove('hidden'); return; }
    const hay = ev._text || (ev._text = (ev.textContent||'').toLowerCase());
    ev.classList.toggle('hidden', !hay.includes(q));
  });
}

$('#thinking').addEventListener('change', e => document.body.classList.toggle('hide-thinking', !e.target.checked));
$('#expand').addEventListener('change', e => document.querySelectorAll('details.tool').forEach(d => d.open = e.target.checked));
$('#filter').addEventListener('input', applyFilter);
$('#open').addEventListener('click', () => $('#file').click());
$('#file').addEventListener('change', e => { const f=e.target.files[0]; if(f) f.text().then(t => render(t, f.name)); });

/* Drag & drop anywhere */
['dragenter','dragover'].forEach(ev => window.addEventListener(ev, e => { e.preventDefault(); document.body.classList.add('dragging'); }));
['dragleave','drop'].forEach(ev => window.addEventListener(ev, e => { e.preventDefault(); if(ev==='drop'||e.relatedTarget===null) document.body.classList.remove('dragging'); }));
window.addEventListener('drop', e => { const f=e.dataTransfer.files[0]; if(f) f.text().then(t => render(t, f.name)); });

/* Legend on the empty state */
(function legend(){
  const wrap = $('#legend');
  for (const [name,t] of Object.entries(TOOL_THEME)) {
    const chip = el('span','badge', t.icon+' '+name);
    chip.style.setProperty('--c', t.c); chip.style.color=t.c; chip.style.borderColor=t.c;
    chip.style.background='color-mix(in srgb,'+t.c+' 12%, transparent)';
    chip.style.fontSize='11px'; chip.style.fontFamily='var(--mono)';
    wrap.appendChild(chip);
  }
})();

/* Auto-load ?file= when served over HTTP. */
(function autoload(){
  const f = new URLSearchParams(location.search).get('file');
  if (f) fetch(f).then(r => r.ok ? r.text() : Promise.reject(r.status))
                 .then(t => render(t, f.split('/').pop()))
                 .catch(err => { $('#empty').innerHTML = '<h2>Could not load</h2><p>'+escapeHtml(f)+' — '+escapeHtml(String(err))+'</p>'; });
})();
</script>
